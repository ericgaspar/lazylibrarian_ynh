#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "lazylibrarian"
name = "LazyLibrarian"
description.en = "Follow authors and grab metadata for all your digital reading needs"
description.fr = "Follow authors and grab metadata for all your digital reading needs"

version = "1.0~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "AGPL-3.0-only"
admindoc = "https://lazylibrarian.gitlab.io/"
code = "https://gitlab.com/LazyLibrarian/LazyLibrarian"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://gitlab.com/LazyLibrarian/LazyLibrarian/-/archive/master/538756baf432d380d8646b889de3cc1c6259250b.tar.gz"
    sha256 = "a4f8adc63e53df472725fc79d81fe3b5170c6f748ee385a9d33e2d0a6c6feb29"

    autoupdate.strategy = "latest_gitlab_tag"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 5299

    [resources.apt]
    packages = "python3-dev, python3-venv, python3, python3-pip, libcurl4-openssl-dev, libssl-dev"
